name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      sha:
        description: "Commit SHA to redeploy (rollback)"
        required: false

concurrency:
  group: deploy-app-name
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run lint
      - run: npm test

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha || github.sha }}

      - name: Resolve deploy SHA
        id: sha
        run: echo "sha=${{ inputs.sha || github.sha }}" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/app-name:${{ steps.sha.outputs.sha }} .
          docker push ghcr.io/${{ github.repository_owner }}/app-name:${{ steps.sha.outputs.sha }}

      - name: Deploy to production
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_DEPLOY_USER }}
          key: ${{ secrets.PROD_DEPLOY_KEY }}
          script: |
            cd /srv/apps/app-name
            sed -i "s|^IMAGE_TAG=.*|IMAGE_TAG=${{ steps.sha.outputs.sha }}|" .env
            docker compose pull
            docker compose up -d
